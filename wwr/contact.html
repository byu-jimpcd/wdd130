<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rafting Site, Contact Us, Paddle Rush</title>
    <meta name="description" content="Page to contact our company">
    <meta name="author" content="Jim Cueva">
    <link rel="stylesheet" href="styles/rafting.css">
</head>

<body>

    <header>
        <img src="images/z-splash.png" alt="Rafting Site Dark Blue Logo">
        <nav>
            <ul class="navigation">
                <li><a href="index.html">Home</a></li>
                <li><a href="about.html">About Us</a></li>
                <li><a href="trips.html">Trips</a></li>
                <li><a href="contact.html">Contact Us</a></li>
            </ul>
        </nav>

    </header>

    <main>
        <section class="company-info">
            <h2>Paddle Rush Rafting Company</h2>
            <p>123 Main River Street</p>
            <p>Kolob, California</p>
            <p>+1 999 999 9999</p>
            <p>info@paddlerush.com</p>
        </section>
        <section class="contact">
            <div class="map">
                <iframe
                  src="https://www.google.com/maps/embed?pb=!1m18!1m12!1m3!1d3879.3068435469136!2d-71.98138832533225!3d-13.516751471009185!2m3!1f0!2f0!3f0!3m2!1i1024!2i768!4f13.1!3m3!1m2!1s0x916dd6739cd7f175%3A0x27c9a9082fc6343!2sPlaza%20Mayor%20de%20Cuzco!5e0!3m2!1ses!2spe!4v1780879105447!5m2!1ses!2spe"
                  width="600" height="450" style="border:0;" allowfullscreen="" loading="lazy"
                  referrerpolicy="no-referrer-when-downgrade"></iframe>
            </div>
            <form>

                <div class="form-item">
                    <label for="name">Name</label>
                    <input type="text" name="name" id="name">
                </div>

                <div class="form-item">
                    <label for="useremail">Email</label>
                    <input type="email" id="useremail" name="useremail">
                </div>

                <div class="form-item">

                    <p>Message Purpose</p>

                    <div class="radio-item">

                        <label>
                            <input type="radio" id="general" name="message_purpose" value="general">
                            General Inquiry
                        </label>
                        <label>
                            <input type="radio" id="reservation" name="message_purpose"
                              value="reservation">
                            Reservation Question
                        </label>

                        <label>
                            <input type="radio" id="website" name="message_purpose" value="website">
                            Website Suggestion
                        </label>

                    </div>

                </div>

                <div class="message">
                    <label for="message">Message</label>
                    <textarea placeholder="Type Here" name="message" id="message"
                      rows="3"></textarea>
                </div>
                <div class="checkbox">
                    <input type="checkbox" id="subscribe" name="subscribe">
                    <label for="subscribe">Please subscribe me to the monthly newsletter</label>
                </div>
                <button type="submit">Get in Touch!</button>

            </form>

        </section>

        <section>

            <h2>We are here to serve you</h2>

            <div class="employees">
                <figure>
                    <img src="images/employee.jpg" alt="Employee Profile" />
                    <figcaption>Employee Profile</figcaption>
                </figure>
                <figure>
                    <img src="images/employee.jpg" alt="Employee Profile" />
                    <figcaption>Employee Profile</figcaption>
                </figure>
                <figure>
                    <img src="images/employee.jpg" alt="Employee Profile" />
                    <figcaption>Employee Profile</figcaption>
                </figure>
            </div>

        </section>

    </main>

    <footer>
        <p>©️2026 ❖ Paddle Rush ❖ Jim Cueva</p>
        <nav class="socialmedia">
            <a href="https://www.instagram.com/">
                <img src="images/instagram.png" alt="Instagram Icon">
            </a>
            <a href="https://www.facebook.com/">
                <img src="images/facebook.png" alt="Facebook Icon">
            </a>
            <a href="https://www.tiktok.com/">
                <img src="images/tiktok.png" alt="Tiktok Icon">
            </a>
        </nav>

    </footer>

</body>

</html>

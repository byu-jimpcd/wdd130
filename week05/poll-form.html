<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="styles/poll-form.css">
    <title>Document</title>
</head>

<body>
    <header>

    </header>
    <main>

        <form>
            <div class="form-item column2">
                <label for="fullname">Full Name:</label>
                <input type="text" id="fullname" name="fullname" required>
            </div>
            <div class="form-item column2">
                <label for="email">Email Address:</label>
                <input type="email" id="useremail" name="useremail" required>
            </div>
            <div class="form-item column1">
                <label for="browser">What is your favorite browser?</label>
                <select name="browser" id="browser">
                    <option value="1">Chrome</option>
                    <option value="2">Safari</option>
                    <option value="3">Edge</option>
                    <option value="4">Brave</option>
                </select>
            </div>
            <div class="form-item column1">
                <label for="pet"><input type="checkbox" id="pet" name="pet">Do you have a household
                    pet?"</label>
            </div>
            <div class="form-item">
                <label for="feedback">List the places you have lived.</label>
                <textarea placeholder="Cusco, Lima, Cincinnati...." id="feedback" name="feedback"
                  rows="4"></textarea>
            </div>
            <button type="submit">Submit Poll</button>
        </form>

    </main>
    <footer>

    </footer>
</body>

</html>
